name: nextjs-saas
description: Next.js 16 + Supabase + AI SaaS — the primary agentic-SaaS stack, AGENTIC-READY by default. Even without AI at MVP, structure allows plug-in without refactor.
version: 2.1.0
agentic_ready: true  # ← 2026 default. Opt out with 'minimal' or 'astro-static'.

# AI SDK selection — see standards/ai-sdks.md for decision tree
ai_sdk: vercel          # web tier: streaming UI, provider-agnostic, Next.js-native
ai_sdk_web: null        # single-SDK topology (no separate web layer)

stack:
  framework: next@16
  runtime: node@22
  language: typescript
  styling:
    - tailwind@4
    - shadcn/ui
  database:
    provider: supabase
    features:
      - postgres
      - rls
      - pgvector
      - storage
      - auth
  ai:
    provider: openai
    models:
      - gpt-5.4-mini
      - text-embedding-3-small
      - whisper-1
    sdk: ai@6
  deploy: vercel
  monitoring: sentry
  testing:
    unit: vitest
    e2e: playwright
    load: k6

detect:
  package_json:
    dependencies:
      - next
      - "@supabase/ssr"
  files:
    - supabase/migrations/

conventions:
  language_ui: czech
  language_code: english
  typescript_strict: true
  color_system: oklch
  component_library: shadcn/ui
  form_validation: zod
  orm: supabase-js (no ORM)

scaffolds:
  claude_md: templates/CLAUDE.md.hbs
  progress_md: templates/PROGRESS.md.hbs
  memory_md: templates/MEMORY.md.hbs
  readme: templates/README.md.hbs
  gitignore: templates/.gitignore.nextjs
  settings: templates/.claude/settings.json.hbs

structure:
  - src/app/
  - src/app/api/
  - src/app/api/chat/           # reserved for future SSE streaming AI endpoint
  - src/app/(auth)/
  - src/app/(dashboard)/
  - src/components/ui/
  - src/components/shared/
  - src/lib/
  - src/lib/supabase/
  - src/lib/ai/                  # agentic-ready: empty now, ready for tools+memory+prompts
  - src/lib/ai/tools/            # LEGO tools (one file per tool)
  - src/lib/ai/memory/           # three-layer memory scaffold
  - src/lib/rate-limit.ts        # ready for AI cost guards
  - src/config/
  - src/types/
  - src/hooks/
  - supabase/migrations/
  - tests/
  - evals/                       # AI eval suite (golden set, regression tests)
  - .claude/
  - .claude/hooks/
  - .claude/agents/
  - .claude/skills/

# Agentic-ready baseline (even if MVP has no AI)
agentic_scaffolding:
  include_safe_tool_wrapper: true        # Copy from standards/ai-patterns.md Pattern 1
  include_memory_scaffold: true          # Layer 1 + 3 ready, Layer 2 when needed
  reserve_chat_endpoint: true            # src/app/api/chat/ folder exists
  include_rate_limit: true               # ready for AI cost guards
  include_eval_suite_folder: true        # evals/ folder with README.md placeholder
  system_prompt_template: true           # src/lib/ai/system-prompt.ts skeleton

agents:
  # Cortex-x adversarial pipeline (source: {cortex_root}/agents/)
  # Invoked via prompts/code-review.md — parallel differentiated review
  - cortex-thinker      # meta — proactive cross-project insights
  - blind-hunter        # diff-only bug detection (no context bias)
  - edge-case-hunter    # boundary condition enumeration
  - acceptance-auditor  # PROGRESS.md / spec drift
  - security-auditor    # 8-layer defense (RLS, injection, secrets)
  - ssot-enforcer       # duplication detection

hooks:
  - block-destructive  # from ~/.claude/shared/hooks/
  - session-start       # from ~/.claude/shared/hooks/
  - pre-compact         # from ~/.claude/shared/hooks/

skills:
  - init-project
  - review-pipeline
  - memory-consolidate

# Sprint 2.29 — Context7 + Supabase, plus optional Playwright for E2E projects.
recommended_mcp_servers:
  - name: context7
    purpose: Up-to-date library documentation injected on demand (Next.js evolves fast)
    install: |
      claude mcp add --transport http context7 https://mcp.context7.com/mcp \
        --header "CONTEXT7_API_KEY: $CONTEXT7_API_KEY"
    severity: recommended
    caveats:
      - "Free tier cut to ~1,000 req/month in Jan 2026; production needs paid tier"
      - "ContextCrush vuln patched 2026-02-23"
  - name: supabase
    purpose: Database introspection + query (read-only by default)
    install: |
      claude mcp add --transport http supabase "https://mcp.supabase.com/mcp?read_only=true"
    severity: recommended
    caveats:
      - "Pre-1.0 (v0.8.1) — expect breaking changes"
      - "NEVER connect to production data; use dev/staging projects only"
  - name: playwright
    purpose: Browser automation for E2E test scaffolding + bug repro
    install: |
      claude mcp add playwright npx @playwright/mcp@latest
    severity: optional
    caveats:
      - "v0.0.75 (pre-1.0) — expect breaking changes"
      - "Playwright MCP is NOT a security boundary (verbatim from upstream README)"

standards_included:
  - ssot
  - modular
  - scalable
  - security

initial_sprint:
  phase_1: Foundation (auth, DB schema, layout)
  phase_2: Core feature (domain logic)
  phase_3: Polish (UX, perf, error states)
  phase_4: Hardening (tests, CI, monitoring)
  phase_5: Deploy

research_topics:
  - "Next.js 16 app router best practices 2026"
  - "Supabase RLS patterns production"
  - "OpenAI cost optimization patterns"
  - "Tailwind 4 + shadcn/ui 2026 patterns"
