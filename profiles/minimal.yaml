name: minimal
description: Minimal scaffold for quick prototypes and experiments — no heavy architecture
version: 1.1.0

# AI SDK selection — see standards/ai-sdks.md for decision tree
# Minimal intentionally opts out. Override if prototype is AI-focused.
ai_sdk: none
ai_sdk_web: null

stack:
  framework: any
  language: any

detect:
  # Minimal is fallback — no auto-detection

conventions:
  typescript_strict: true
  no_heavy_abstractions: true

scaffolds:
  claude_md: templates/CLAUDE.minimal.md.hbs
  gitignore: templates/.gitignore.minimal

structure:
  - src/
  - .claude/

hooks:
  - block-destructive

skills: []

standards_included:
  - ssot
  - modular

initial_sprint:
  phase_1: Build it
  phase_2: Ship it
