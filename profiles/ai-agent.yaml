name: ai-agent
description: Autonomous multi-step AI agent — Claude Agent SDK primary, Vercel AI SDK optional for web surface, three-layer memory, MCP integration
version: 1.1.0

# AI SDK selection — see standards/ai-sdks.md for decision tree
# Two-SDK topology: autonomy tier + web tier
ai_sdk: claude-agent    # autonomy tier: filesystem/shell, Skills, MCP, subagents
ai_sdk_web: vercel      # web tier (if chat UI exposed): streaming SSE

stack:
  framework: next@16
  runtime: node@22
  language: typescript
  ai:
    sdk: ai@6
    providers:
      - anthropic (Claude Opus 4.7 / Sonnet 4.5)
      - openai (gpt-5.4-mini as fallback)
    validation: zod@4 (strip $schema for OpenAI compat)
    protocol: mcp (Model Context Protocol for tool portability)
  database:
    provider: supabase
    features:
      - postgres
      - rls
      - pgvector  # for memory + RAG
  streaming: SSE
  deploy: vercel

detect:
  package_json:
    dependencies:
      - ai
      - "@anthropic-ai/sdk"  # or openai
      - "@supabase/ssr"
    files:
      - lib/ai/tools/
      - lib/ai/memory/

conventions:
  agent_loop: "streamText with stopWhen: stepCountIs(N)"
  error_recovery: safe-tool wrapper (tools never throw, AI retries with alternatives)
  memory:
    layer_1: core index (always in context, compact markdown)
    layer_2: pgvector semantic search
    layer_3: activity log (append-only, searchable)
  memory_consolidation: autoDream nightly cron (rebuild index, dedup, promote)
  chat_api: Chat Completions (not Responses — bugs with gpt-5.x tool calling)
  tool_pattern: LEGO (one tool = one thing, agent composes)
  think_tool: explicit reasoning tool for complex decisions (Think-Plan-Execute)

structure:
  - src/lib/ai/tools/*.ts          # one tool per file
  - src/lib/ai/safe-tool.ts        # wrapper: strips $schema, try-catch
  - src/lib/ai/system-prompt.ts    # versioned
  - src/lib/ai/memory/             # 3-layer memory
  - src/lib/ai/execute-text.ts     # streamText orchestrator
  - src/app/api/chat/route.ts      # SSE streaming
  - src/app/api/cron/autodream/    # memory consolidation cron

agents:
  # DEFAULT adversarial pipeline (source: {cortex_root}/agents/)
  # Overridden per-project by research-driven generation (see prompts/new-project.md Phase 4)
  - cortex-thinker
  - blind-hunter
  - edge-case-hunter
  - acceptance-auditor
  - security-auditor       # 8-layer + Layer 9 Agentic (lethal trifecta, 7 MUST patterns)
  - correctness-auditor    # Zod boundaries, property tests, eval coverage, mutation, stateful
  - ssot-enforcer          # LEGO tool pattern — no duplicate tools

hooks:
  - block-destructive
  - session-start
  - pre-compact
  - auto-orchestrate       # 3-fronta rule — research parallelizable, implementation single-thread
  - post-tool-use          # journal + budget traces for evolve
  - tirith-scan            # context-file injection scanner (optional; no-op if tirith binary absent)

skills:
  - tool-audit             # validates tool permissions + Zod schemas (bounded args)
  - memory-audit           # validates 3-layer architecture
  - prompt-injection-test  # golden set of injection attempts + expected refusals
  - trifecta-check         # architectural scan: private-data + untrusted + egress combinations

standards_included:
  - ssot
  - modular
  - scalable
  - security               # + § Agentic Security (2026) — 7 MUST patterns
  - testing
  - observability          # + § Runtime SLOs, circuit breakers, LLM obs stack
  - correctness            # Zod boundaries, property tests, eval-driven dev, mutation, stateful
  - skills                 # agentskills.io SKILL.md spec — portable across Claude Code / Hermes / Codex
  - ai-patterns

# Agentic-security MUST patterns — mandatory for this profile.
# Enforced by security-auditor agent Layer 9; scaffold fails if missing.
agentic_security_musts:
  - trust_fence                 # external content wrapped in <untrusted> delimiters + spotlighting
  - trifecta_split              # no single agent combines private-data + untrusted + egress
  - schema_bounded_tool_args    # Zod enums/allow-lists, no raw paths/URLs
  - capability_scoped_auth      # agent's own OAuth client, MCP 2025-11 + RFC 8707
  - destructive_op_hitl         # wrapper-enforced confirmation, not prompt-based
  - structured_output_validation  # LLM output through schema + business rules before sink
  - sandboxed_code_exec         # Deno perms / gVisor / Firecracker / E2B for LLM-authored code
  - unbounded_consumption_caps  # per-session + per-user token + tool-call caps + kill switch

# Correctness mandates — enforced by correctness-auditor
correctness_musts:
  - zod_at_every_boundary       # API routes, LLM output parse, webhook, env var, DB readback
  - eval_suite                  # ≥20 golden cases in CI, forbidden-output assertions included
  - property_tests_on_invariant_code  # pricing, state machines, retry/dedup
  - mutation_scheduled          # nightly/weekly on critical modules (billing, auth)

initial_sprint:
  phase_1: Foundation (Next.js, Supabase, AI SDK setup)
  phase_2: First tools (LEGO pattern, safe-tool wrapper)
  phase_3: Agent loop (streamText + stepCountIs)
  phase_4: Three-layer memory + autoDream cron
  phase_5: System prompt engineering (Think-Plan-Execute)
  phase_6: MCP integration (tool portability)
  phase_7: Production hardening (tests, monitoring, cost guards)

research_topics:
  - "Vercel AI SDK v6 streamText stopWhen patterns"
  - "MCP Model Context Protocol server implementation 2026"
  - "Three-layer memory architecture LLM agents"
  - "autoDream memory consolidation 6-signal scoring"
  - "Prompt injection defense 2026"
