name: qa-engineer
description: QA-focused profile — for projects where the audit + retrofit goal is testing strategy specifically (existing repo, AI-augmented tester, ISO 25010 + ASVS 5.0 alignment). Pairs with /test-audit prompt.
version: 1.0.0
agentic_ready: true   # this profile EXPECTS AI-augmented testing workflows from day 1

# AI SDK selection — see standards/ai-sdks.md decision tree
ai_sdk: vercel       # web tier; AI-aug agents like Claude Code MCP slot in here
ai_sdk_web: null

stack:
  framework: "*"             # framework-agnostic — qa-engineer is a lens, not a stack choice
  runtime: "*"
  language: "*"
  testing:
    unit: vitest@4 | jest@30 | node:test
    component: react-testing-library@16 | vue-test-utils@2
    integration: vitest@4 + msw@3
    contract:
      provider_schema: openapi
      consumer: pact@13
      fuzzer: schemathesis
    e2e: playwright@1.50
    mutation: stryker@9 | pitest@1
    property: fast-check@4 | hypothesis
    visual: chromatic | percy | playwright_screenshot
    a11y: axe-core@4 + jest-axe | lighthouse-ci
    perf: k6@0.55 + lighthouse-ci
    load: k6 | artillery
    ai_eval: vercel-ai-evals | promptfoo

detect:
  # qa-engineer is invoked explicitly via /test-audit; no auto-detection
  invoke_via: ["/test-audit", "qa-retrofit prompt"]
  fallback: existing-project-audit  # if user wants general audit, fall back to /audit

conventions:
  language_ui: czech       # Dave's preference; override per project
  language_code: english
  test_naming:
    unit: "*.test.{ts,tsx,js,cjs}"
    integration: "*.integration.test.{ts,cjs}"
    e2e: "tests/e2e/**/*.spec.{ts,js}"
    contract: "tests/contract/**/*.test.{ts,cjs}"
    property: "tests/property/**/*.test.{ts,cjs}"
    eval: "evals/**/*.{json,yaml}"
  assertion_style: arrange-act-assert
  determinism: required    # no Math.random, no Date.now in test bodies, no real network

scaffolds:
  testing_strategy: templates/testing-strategy.md.hbs
  testing_gaps: templates/testing-gaps.md.hbs
  qa_audit_section: templates/CLAUDE.md.hbs   # appends QA section

structure:
  - tests/
  - tests/unit/
  - tests/integration/
  - tests/contract/
  - tests/e2e/
  - tests/property/
  - tests/qa-retrofit/         # sample tests seeded by Phase 6 (opt-in)
  - tests/fixtures/
  - evals/                     # AI eval suite (golden set, regression rubric)
  - cortex/qa/                 # qa-retrofit deliverables live here

# Quality gates (mutation-tier-aware, not just line coverage)
quality_gates:
  high_risk_modules:
    line_coverage: 80
    branch_coverage: 70
    mutation_score: 75
    examples: [payment, auth, rls, billing, ai_tool_dispatch]
  mid_risk_modules:
    line_coverage: 70
    branch_coverage: 60
    mutation_score: 60
    examples: [orchestrators, business_logic, schema_migrations]
  low_risk_modules:
    line_coverage: 50
    mutation_score: advisory  # don't gate, just report
    examples: [ui_presentation, glue, formatters]
  excluded:
    - "**/dist/**"
    - "**/.next/**"
    - "**/node_modules/**"
    - "**/*.generated.*"

# CI gating philosophy
ci_gates:
  block_on_red: [unit, integration, critical_path_e2e]
  soft_block: [mutation_regression, perf_budget_regression]
  inform_only: [a11y_score, visual_diff, full_mutation_sweep]
  nightly_only: [stripe_sandbox, k6_load, full_mutation]

# Compliance mappings
compliance_targets:
  default: ASVS_L1
  recommended_by_stack:
    nextjs-saas: ASVS_L2
    chatbot-platform: ASVS_L2
    ai-agent: ASVS_L2
    browser-agent: ASVS_L2
    minimal: ASVS_L1
    astro-static: ASVS_L1

# Cortex-x adversarial pipeline (for synthesis review)
agents:
  - cortex-thinker      # meta — proactive cross-project insights
  - blind-hunter        # diff-only test review (catches brittle assertions)
  - edge-case-hunter    # boundary condition enumeration in tests
  - acceptance-auditor  # verifies gaps map to documented acceptance criteria
  - security-auditor    # ASVS 5.0 alignment of security tests
  - correctness-auditor # property-test + mutation-fitness coverage
  - ssot-enforcer       # duplicate test fixtures, parallel test files

hooks:
  - block-destructive
  - session-start
  - pre-compact

skills:
  - test-audit
  - cortex-init

standards_included:
  - testing
  - correctness
  - security
  - ssot           # tests are also subject to SSOT; duplicated fixtures = anti-pattern
  - test-types-catalog  # Sprint 2.10.4 — exhaustive 112-entry catalog of 2026 test types

# Test types catalog reference (Sprint 2.10.4)
# The qa-engineer profile owns the complete 2026 catalog of ~112 test types
# across 12 categories. Audit picks the SUBSET; profile owns the SUPERSET.
# Selection during Phase 5 of qa-retrofit.md is evidence-driven:
#   audit_finding × catalog.when_to_use → match
#   stack_signal × catalog.skip_when    → filter
#   q5_capacity × catalog.tester_skill_floor → tier
#   q3_compliance × catalog.compliance_tag → escalate
test_types_catalog:
  source: "{cortex_source}/standards/test-types-catalog.md"
  total_entries: 112
  categories: 12
  selection_principle: "Apply the LEAST testing necessary to verify the most critical risks"
  category_list:
    - functional         # 17 entries (unit-pure-function ... i18n-runtime-render)
    - performance        # 8 entries (perf-budget-lighthouse ... perf-cold-start-budget)
    - security           # 19 entries (sast ... rls-bypass)
    - reliability        # 9 entries (chaos-injection ... rate-limit-test)
    - correctness        # 6 entries (property-fast-check ... line-branch-coverage)
    - contract           # 6 entries (pact-consumer ... api-versioning)
    - a11y               # 6 entries (axe-component ... rtl-locale)
    - ai-eval            # 12 entries (eval-suite-rubric ... multiturn-conversation)
    - devops             # 14 entries (workflow-lint ... cache-poisoning)
    - data               # 4 entries (validation-boundary ... etl-lineage)
    - compliance         # 8 entries (gdpr-art32 ... coppa-ferpa)
    - docs               # 3 entries (link-rot ... api-doc-drift)
  typical_audit_selection: "12-25 entries from the 112-entry catalog"
  re_curation_cadence: "annually (or after major shifts: ISO 25010 revision, ASVS major version, AI Act enforcement phase)"

# Research topic taxonomy (qa-retrofit Phase 4 uses this)
# Split into testing-only (10) + DevOps/CI quality (5) per Sprint 2.10.1 operator request.
# Rationale: a 2026 tester owns the full "is verification real" surface, not just test code.
qa_concerns:
  # Testing-only concerns
  - e2e-strategy
  - unit-fitness
  - contract-testing
  - security-testing
  - perf-testing
  - a11y-testing
  - ai-eval
  - test-observability
  - mutation-fitness
  - risk-based-prioritization
  # DevOps/CI quality concerns (Sprint 2.10.1)
  - ci-pipeline-testing       # actionlint, pinact, gate consistency, secret hygiene
  - iac-testing               # kubeval, kube-linter, tflint, OPA/Conftest, drift detection
  - container-security        # hadolint, Trivy/grype, syft SBOM, SLSA provenance
  - deploy-safety             # canary/blue-green, post-deploy smoke, observability assertion, DORA
  - secret-supply-chain       # gitleaks, osv-scanner, npm-audit, dep pinning

# Auto-research-nudge pattern (Sprint 2.10.1)
# Every gap in testing-gaps.md ships with an inline "Research nudge:" line —
# trains junior testers to research-first before writing the fix. Per Sprint
# 2.10 R1: orgs that audit-then-research closed the 75/16 AI-testing adoption gap.
auto_research_nudge:
  enabled: true
  apply_to: [P0, P1, P2]
  skip_for_trivial: true     # don't nudge for <5-minute gaps
  nudge_format: |
    Before starting this gap, paste into Claude Code:
    > "Research best practices 2026 for <gap-specific concern>: <2-3 sub-questions>.
    >  Min 5 cited URLs. 200-word memo."

# Auto-research-PER-GAP pattern (Sprint 2.10.3) — for junior testers without
# prior experience. When the qa-engineer profile is active (set by install
# --profile=qa-tester), Phase 5f dispatches up to 15 parallel WebSearch agents,
# one per P0+top-P1 gap, and inlines the resulting 200-word memo (3 patterns +
# 2 anti-patterns + minimal-working-example snippet + 5+ cited URLs) directly
# under each gap entry in testing-gaps.md. Removes the cold-start tax for
# juniors who don't yet know which sources to trust. SKIP/OPEN/off-limits gaps
# are NEVER auto-researched (context-dependent). Cost guard: hard stop at 15.
auto_research_per_gap:
  enabled: true              # default ON for qa-tester profile
  max_gaps: 15               # P0 + top P1 by risk; past 15 = budget-prohibitive
  parallel_waves: 5          # anthropic multi-agent paper budget
  apply_to: [P0, P1]         # NEVER P2/SKIP/OPEN/off-limits/FYI
  query_template: |
    Research best practices 2026 for <gap.title> in <stack>:
    - 3 concrete implementation patterns with cited URLs (min 2 sources per claim)
    - 2 anti-patterns to avoid (cited)
    - 1 minimal-working-example code/config snippet
    - 200-word memo, 5+ cited URLs, recency-biased to last 12 months
  output_path: "{cortex_data_home}/research/{slug}-qa-gap-{gap_id}-{date}.md"
  inline_summary: true       # append summary under gap entry in testing-gaps.md
  cost_guard:
    hard_stop_at_gap_count: 15
    estimated_tokens_per_gap: 60000  # ~900K total for full sweep
    flat_subscription_safe: true     # Claude Max x20 covers this
    metered_warning: true            # warn in Phase 7 closing on metered plan

# Profile-aware default behavior
# - profile: qa-tester  → auto_research_per_gap.enabled = true (Phase 5f fires)
# - profile: dev / ai-engineer / minimal → only auto_research_nudge fires (Phase 5e)
# Override via prompt --auto-research-gaps / --no-auto-research-gaps

# References (grounded in)
grounded_in:
  - "ISO/IEC 25010:2023 — Software product quality model (9 characteristics: Functional Suitability, Performance Efficiency, Compatibility, Interaction Capability, Reliability, Security, Maintainability, Flexibility, Safety)"
  - "OWASP ASVS 5.0 (May 2025) — Application Security Verification Standard, Levels 1/2/3"
  - "James Bach — Heuristic Test Strategy Model (HTSM) — SFDPOT × FDSFSCURA"
  - "Michael Feathers — Working Effectively with Legacy Code (characterization tests + seam model)"
  - "Janet Gregory + Lisa Crispin — Agile Testing Quadrants (Q1-Q4)"
  - "Peruma et al., FSE'20 — tsDetect (19 test-smell detectors)"
  - "Trail of Bits 2026 — Mutation testing for the agentic era (StrykerJS as fitness function)"

# Initial sprint shape (when applied to a fresh repo audit)
initial_sprint:
  phase_1: P0 detect (test surface inventory)
  phase_2: P1 inventory (smell scan + hot-file × test-coverage map)
  phase_3: P2 audit (12-section ISO 25010 + cortex extras)
  phase_4: P3 human gate (5 irreducible questions)
  phase_5: P4 research (3-5 stack-specific topics)
  phase_6: P5 synthesis (testing-strategy.md + testing-gaps.md)
  phase_7: P6 sample-test seeding (opt-in, top 3 P0 gaps)

# 2026 default research topics for QA retrofit (planner can override per project)
research_topics:
  - "ISO/IEC 25010:2023 Safety characteristic testing 2026"
  - "StrykerJS 9 mutation testing thresholds 2026"
  - "Playwright 1.50+ vs Cypress 14 for e-commerce 2026"
  - "OWASP ASVS 5.0 Level 2 admin panel test patterns"
  - "fast-check property-based testing legacy codebase patterns"
  - "tsDetect test-smell detection in TypeScript 2026"
  - "Pact + Schemathesis contract testing for REST API pairs"
  - "AI-augmented QA workflows — Claude Code + Playwright MCP 2026"
  # DevOps/CI quality (Sprint 2.10.1)
  - "actionlint + pinact GitHub Actions correctness gates 2026"
  - "Trivy + Syft container image scanning + SBOM 2026"
  - "kube-linter + Conftest IaC policy gates 2026"
  - "DORA metrics dashboard tooling 2026"
  - "gitleaks + osv-scanner secret + dep gates in CI 2026"
