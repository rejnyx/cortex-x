name: chatbot-platform
description: Multi-tenant chatbot platform — channel adapters (Telegram, WhatsApp, Web, Chatwoot), RLS tenant isolation, orchestrator
version: 1.1.0

# AI SDK selection — see standards/ai-sdks.md for decision tree
ai_sdk: vercel          # primary: streaming + provider-agnostic for multi-tenant flexibility
ai_sdk_web: null        # single-SDK topology (orchestrator runs in-process)

stack:
  framework: next@16
  runtime: node@22
  language: typescript
  styling:
    - tailwind@4
    - shadcn/ui
  database:
    provider: supabase
    features:
      - postgres
      - rls
      - pgvector
      - realtime
  queue: upstash-redis
  ai:
    provider: openai  # or anthropic
    sdk: ai@6
    models:
      - gpt-5.4-mini
      - text-embedding-3-small
  channels:
    - telegram (grammY)
    - whatsapp (cloud api)
    - web-widget (iframe/sdk)
    - chatwoot (webhook)
  deploy: vercel

detect:
  package_json:
    dependencies:
      - "@supabase/ssr"
      - grammy
      - ai
    files:
      - app/api/webhook/
      - lib/adapters/

conventions:
  channel_pattern: adapter (inbound → canonical → orchestrator → canonical → outbound)
  tenant_isolation: RLS first (never trust app-layer)
  message_type: CanonicalMessage (channel-agnostic)
  rate_limiting: per-tenant + per-user + per-channel
  typescript_strict: true

structure:
  - src/app/(admin)/                   # platform-level admin
  - src/app/(tenant)/[workspace]/      # customer-facing
  - src/app/api/webhook/[channel]/
  - src/lib/adapters/telegram/
  - src/lib/adapters/whatsapp/
  - src/lib/adapters/web/
  - src/lib/adapters/chatwoot/
  - src/lib/orchestrator/
  - src/lib/ai/
  - src/lib/supabase/
  - supabase/migrations/

agents:
  # DEFAULT adversarial pipeline (source: {cortex_root}/agents/)
  # Overridden per-project by research-driven generation (see prompts/new-project.md Phase 4)
  - cortex-thinker
  - blind-hunter
  - edge-case-hunter
  - acceptance-auditor
  - security-auditor    # critical for multi-tenant (RLS + tenant isolation)
  - ssot-enforcer       # catches adapter-pattern duplication

hooks:
  - block-destructive
  - session-start
  - pre-compact

skills:
  - adapter-audit       # checks all channels use canonical pattern
  - rls-audit           # validates RLS on every tenant table

# Sprint 2.29 — same MCP recs as ai-agent (Context7 + Supabase read-only).
# No generic RAG MCP recommended — chatbot projects use Supabase pgvector natively.
recommended_mcp_servers:
  - name: context7
    purpose: Up-to-date library documentation injected on demand
    install: |
      claude mcp add --transport http context7 https://mcp.context7.com/mcp \
        --header "CONTEXT7_API_KEY: $CONTEXT7_API_KEY"
    severity: recommended
    caveats:
      - "Free tier cut to ~1,000 req/month in Jan 2026; production needs paid tier"
      - "ContextCrush vuln patched 2026-02-23; community-registry remains structural attack surface"
  - name: supabase
    purpose: Database introspection + query (read-only by default)
    install: |
      claude mcp add --transport http supabase "https://mcp.supabase.com/mcp?read_only=true"
    severity: recommended
    caveats:
      - "Pre-1.0 (v0.8.1) — expect breaking changes"
      - "NEVER connect to production data; use dev/staging projects only"

standards_included:
  - ssot
  - modular
  - scalable
  - security

initial_sprint:
  phase_1: Foundation (auth, DB schema, RLS, multi-tenant)
  phase_2: Orchestrator + canonical message pipeline
  phase_3: First adapter (web widget)
  phase_4: Telegram + WhatsApp adapters
  phase_5: Admin UI + analytics
  phase_6: Production deploy + first tenant

research_topics:
  - "Multi-tenant RLS patterns Supabase 2026"
  - "Canonical message type cross-channel chatbot"
  - "grammY Telegram bot Next.js 16 webhook"
  - "Chatwoot v2 API handoff patterns"
