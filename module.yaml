# cortex-x module manifest
# Inspired by BMAD's module.yaml pattern for skill distribution + config resolution.

version: 1.0.0
name: cortex-x
description: AI-agentic-first Claude Code framework — bootstrap + institutional wisdom + adversarial review
author: David Rajnoha (Rejnyx)
repo: https://github.com/Rejnyx/cortex-x
license: PolyForm-Noncommercial-1.0.0

# Config variables — resolved via {placeholder} syntax in prompts/agents.
# These are DEFAULTS shipped with the framework. For your own install,
# create `module.local.yaml` (gitignored) with overrides:
#
#   config:
#     user_name: "Your Name"
#     communication_language: cs  # cs | en
#     ...
#
config:
  user_name: ""          # user sets via module.local.yaml
  communication_language: en
  code_language: en
  ui_language: en

  # Paths (cross-platform — use forward slashes, Node os.homedir() resolves)
  cortex_root: "~/Desktop/APPs/cortex-x"
  cortex_root_alt: "~/cortex-x"
  projects_path: "{cortex_root}/projects"
  standards_path: "{cortex_root}/standards"
  profiles_path: "{cortex_root}/profiles"
  prompts_path: "{cortex_root}/prompts"
  agents_path: "{cortex_root}/agents"
  templates_path: "{cortex_root}/templates"
  insights_path: "{cortex_root}/insights"
  proposals_path: "{cortex_root}/insights/proposals"
  journal_path: "{cortex_root}/journal"
  research_path: "{cortex_root}/research"
  evals_path: "{cortex_root}/evals"
  evolve_config: "{cortex_root}/config/evolve.yaml"

  # Defaults
  default_profile: nextjs-saas
  default_license: proprietary
  default_testing: vitest+playwright
  default_deploy: vercel

# Skills/prompts distribution
skills:
  core:
    - new-project       # Bootstrap with discovery + research + scaffold
    - project-scan      # Slim 5-section scan (SSOT-respecting)
    - cortex-sync       # Capture decisions/lessons post-work
    - cortex-load       # Mental model cheat sheet
    - cortex-reflect    # Meta-reflection via cortex-thinker
    - code-review       # 5-agent parallel adversarial pipeline
    - cortex-doctor     # Self-healthcheck
    - sprint-status     # PROGRESS.md parser + next-action
    - retrospective     # Post-sprint capture to cortex library
    - cortex-evolve     # Self-improvement loop (daily/weekly/monthly cadence)

# Agents registration
agents:
  meta:
    - cortex-thinker    # Proactive observations, grounded insights
  review:
    - blind-hunter      # Diff-only bug detection
    - edge-case-hunter  # Boundary condition enumeration
    - acceptance-auditor  # Spec/PROGRESS.md drift check
    - security-auditor  # 8-layer defense audit
    - ssot-enforcer     # Duplication detection

# Hooks (installed to ~/.claude/shared/hooks via install.sh)
hooks:
  global:
    - block-destructive  # rm -r, force push, DROP TABLE blocking (PreToolUse matcher: Bash)
    - session-start      # PROGRESS.md + git + cortex-x awareness (SessionStart)
    - pre-compact        # Sprint state recovery before compaction (PreCompact)
    - pre-tool-use       # Journal companion: records tool-call start ts for duration_ms (PreToolUse, all tools)
    - post-tool-use      # Journal writer: appends JSONL entry per tool call (PostToolUse, all tools)

# Profiles (project types for new-project bootstrap)
profiles:
  - nextjs-saas      # Next.js SaaS with Supabase + OpenAI (primary)
  - chatbot-platform # Multi-tenant chatbot
  - waas-template    # Website-as-a-Service
  - ai-agent         # Autonomous multi-step agent
  - tauri-desktop    # Cross-platform desktop
  - astro-static     # Portfolio/blog/docs
  - cli-tool         # npm CLI
  - kiosek           # Touch PWA
  - minimal          # Quick prototype

# Standards (11 pillars enforced in scaffolded projects)
standards:
  - ssot
  - modular
  - scalable
  - security
  - testing
  - observability
  - performance
  - accessibility
  - error-handling
  - git-workflow
  - documentation

# Health gates (checked by cortex-doctor)
health_checks:
  required:
    - hooks_installed
    - global_claude_md_references_cortex
    - at_least_one_profile_exists
    - standards_readable
  warning_if:
    - research_older_than_6_months
    - no_projects_scanned
    - sprint_status_overdue
    - audit_overdue

# Audit schedule
audit:
  first_audit_date: 2026-07-17
  cadence_months: 3
  checklist_path: "{cortex_root}/docs/3-month-audit.md"

# Self-improvement loop (see docs/self-improvement-rfc.md for design)
evolve:
  config_path: "{cortex_root}/config/evolve.yaml"
  prompt_path: "{cortex_root}/prompts/cortex-evolve.md"
  proposals_inbox: "{cortex_root}/insights/proposals/"
  evals_suite: "{cortex_root}/evals/"
  cadence:
    daily: ingest_only
    weekly: insight_mining_plus_pr
    monthly: eval_suite_plus_refinement
  hard_rule: never_auto_merge_source_of_truth

# Auto-research protocol (cortex primitive — referenced by multiple prompts)
research:
  config_path: "{cortex_root}/config/research.yaml"
  protocol_path: "{cortex_root}/shared/research-protocol.md"
  cache_path: "{cortex_root}/research/"
  default_on: true  # prompts auto-invoke when triggers match, opt-out with --no-research
  budget_per_week: 10
  hard_rule: always_cite_sources_prefer_official_docs

# Cross-platform compatibility
platforms:
  windows:
    install_script: install.ps1
    shell: PowerShell
    homedir_var: $HOME
  unix:
    install_script: install.sh
    shell: bash
    homedir_var: $HOME
  macos:
    install_script: install.sh
    shell: zsh / bash
    homedir_var: $HOME
