# steward-lint-fix.yml — autonomous Steward eslint --fix shipper.
#
# Sprint 1.8.10 shipped lint_fix_shipper action_kind. This workflow runs
# weekly (Wednesday 08:00 UTC) and runs `eslint --fix` + tsc, applying
# auto-fixes and opening gh issues for type errors that can't be auto-fixed.
#
# Mixed pattern: when eslint produces edits → atomic commit + draft PR.
# When only type errors → skip_commit, gh issues only.

name: steward lint-fix

# Permissions: workflow_hardener Sprint 2.5b — least-privilege baseline + per-job elevation.
permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 3'     # Weekly Wednesday at 08:00 UTC

concurrency:
  group: steward-lint-fix-${{ github.event.repository.name }}
  cancel-in-progress: false

jobs:
  steward-lint-fix:
    name: steward lint-fix
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'

      - name: Install deps
        run: npm ci || npm install

      - name: Verify pre-action test baseline
        run: npm test

      - name: Configure git identity (Steward commits)
        run: |
          git config user.name  "Steward (cortex-x)"
          git config user.email "steward@cortex-x.local"

      - name: Steward lint-fix dry-run (plan only)
        id: plan
        run: |
          mkdir -p $GITHUB_WORKSPACE/.cortex-data
          node bin/cortex-steward.cjs dry-run \
            --slug=${{ github.event.repository.name }} \
            --trigger=cron \
            --kind=lint_fix_shipper \
            --json > /tmp/steward-lint-plan.json
          cat /tmp/steward-lint-plan.json
          if jq -e '.mode == "dry-run"' /tmp/steward-lint-plan.json > /dev/null; then
            echo "has_action=true"  >> $GITHUB_OUTPUT
          else
            echo "has_action=false" >> $GITHUB_OUTPUT
            echo "No lint issues — exiting clean."
          fi
        env:
          CORTEX_DATA_HOME: ${{ github.workspace }}/.cortex-data
          GH_TOKEN:         ${{ github.token }}

      - name: Steward lint-fix execute (eslint --fix + tsc + commit + draft PR + issues)
        if: steps.plan.outputs.has_action == 'true'
        run: |
          node bin/cortex-steward.cjs execute \
            --plan-file=/tmp/steward-lint-plan.json
        env:
          # No OPENROUTER_API_KEY — lint_fix_shipper is deterministic
          STEWARD_DAILY_USD_CAP:      '5'
          STEWARD_WEEKLY_USD_CAP:     '25'
          STEWARD_MONTHLY_USD_CAP:    '80'
          STEWARD_TOKEN_VELOCITY_CAP: '50000'
          STEWARD_FAILURE_BREAKER:    '3'
          CORTEX_DATA_HOME:           ${{ github.workspace }}/.cortex-data
          GH_TOKEN:                   ${{ github.token }}

      - name: Upload journal artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: steward-lint-fix-journal-${{ github.run_id }}
          path: .cortex-data/journal/
          retention-days: 30
