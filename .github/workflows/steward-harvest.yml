# steward-harvest.yml — autonomous Steward recommendation harvester workflow.
#
# Sprint 1.8.2c shipped recommendation_harvest action_kind. This workflow runs
# the harvester daily at 03:00 UTC (1h before the main recommendation cron),
# so cortex/recommendations.md is always fresh substrate for the LLM run.
#
# Pipeline: dry-run --kind=recommendation_harvest → execute → append candidates
# to recommendations.md → atomic commit → push → gh pr create --draft.
#
# No LLM call — deterministic harvester reads gh PR/CI/issue signals only.
# Cost: $0/run. Spend cap not relevant (free path).
#
# See detectors/recommendation-harvest.cjs for signal sources.

name: steward harvest

# Permissions: workflow_hardener Sprint 2.5b — least-privilege baseline + per-job elevation.
permissions:
  contents: read

on:
  workflow_dispatch:        # manual run via GH UI / `gh workflow run steward-harvest.yml`
  schedule:
    - cron: '0 3 * * *'     # Daily 03:00 UTC — 1h before main steward.yml recommendation cron.
                            # Refills recommendations.md with fresh candidates from CI/PR/issue
                            # signals so the 04:00 LLM run always has substrate.

# Mutex-by-repo: at most one harvester per repo. Different concurrency group from
# steward.yml — they can race-free in parallel (harvest writes recs.md only,
# recommendation reads recs.md so timing is harmless).
concurrency:
  group: steward-harvest-${{ github.event.repository.name }}
  cancel-in-progress: false

jobs:
  steward-harvest:
    name: steward harvest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write           # commit on steward/<date>-recommendation-harvest-<id>
      pull-requests: write      # gh pr create --draft

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'

      - name: Install deps
        run: npm ci || npm install

      - name: Configure git identity (Steward commits)
        run: |
          git config user.name  "Steward (cortex-x)"
          git config user.email "steward@cortex-x.local"

      - name: Steward harvest dry-run (plan only)
        id: plan
        run: |
          mkdir -p $GITHUB_WORKSPACE/.cortex-data
          node bin/cortex-steward.cjs dry-run \
            --slug=${{ github.event.repository.name }} \
            --trigger=cron \
            --kind=recommendation_harvest \
            --json > /tmp/steward-harvest-plan.json
          cat /tmp/steward-harvest-plan.json
          if jq -e '.mode == "dry-run"' /tmp/steward-harvest-plan.json > /dev/null; then
            echo "has_action=true"  >> $GITHUB_OUTPUT
          else
            echo "has_action=false" >> $GITHUB_OUTPUT
            echo "Harvester found no fresh candidates — exiting clean."
          fi
        env:
          CORTEX_DATA_HOME: ${{ github.workspace }}/.cortex-data
          GH_TOKEN:         ${{ github.token }}

      - name: Steward harvest execute (append to recs.md, commit, draft PR)
        if: steps.plan.outputs.has_action == 'true'
        run: |
          node bin/cortex-steward.cjs execute \
            --plan-file=/tmp/steward-harvest-plan.json
        env:
          # No OPENROUTER_API_KEY — harvest is deterministic, no LLM call
          CORTEX_DATA_HOME: ${{ github.workspace }}/.cortex-data
          GH_TOKEN:         ${{ github.token }}

      - name: Upload journal artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: steward-harvest-journal-${{ github.run_id }}
          path: .cortex-data/journal/
          retention-days: 30
