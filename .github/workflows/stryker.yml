name: stryker-mutation

# Mutation-testing workflow — Sprint 2.3 v0 measure-only posture.
# Hardened per Sprint 2.3.1 R2 security review (2026-05-14).
#
# Two modes:
#   PUSH (main + feature branches)  →  incremental scan via --since=HEAD~1.
#                                      Reads cache, compares against last
#                                      baseline, exits 0 regardless (break: null).
#   NIGHTLY (cron Sun 03:00 UTC)    →  full scan across all configured modules.
#                                      Writes incremental cache for next push.
#
# R2 hardening 2026-05-14:
#   - HIGH-1 supply-chain: `npm ci --ignore-scripts` + exact-pinned Stryker
#     version (no caret) to prevent install-script RCE via transitive deps.
#   - HIGH-2 cache poisoning: cache writes ONLY on main; non-main pushes
#     restore-only with no cross-branch fallback (prevents feature/poison
#     branch corrupting main's incremental state).
#   - HIGH-3 binary integrity: `npx --no-install stryker` refuses to fetch
#     binary on the fly; lockfile presence guard before npm ci.
#   - HIGH-4 inline JS injection: extracted summarizer to
#     tools/summarize-mutation.cjs (fixed path, no shell interpolation).
#
# References:
#   - R1 refresh memo: docs/research/sprint-2.3-mutation-testing-fitness-refresh-2026-05-10.md
#   - R1 fresh memo: docs/research/sprint-2.3-mutation-testing-fitness-2026-05-14.md
#   - Standard: standards/mutation-testing.md

on:
  # Sprint 2.40 (2026-06-01): both push AND schedule triggers removed.
  # The workflow has accumulated multiple latent bugs since Sprint 2.3 (May
  # 14) that never surfaced because the workflow never got past its first
  # gate — they cascaded one at a time over a 2026-06-01 debug session:
  #   1. package-lock.json was .gitignored but workflow ran `npm ci`
  #      → fixed by committing lockfile (commit 617ee5e).
  #   2. `--since=HEAD~1` is not a real Stryker CLI flag
  #      → fixed by switching to `--incremental` (commit 07c2d0a).
  #   3. Stryker sandbox copy mechanism interacts with the fixture
  #      content-hash check (FIXTURE_SHA_DRIFT) in eval-senior-tester:
  #      all 5 fixtures' SHAs computed in the sandbox differ from the
  #      committed baseline, even though the `test` workflow runs the
  #      exact same `npm test` and passes. This is a deeper sandbox-vs-
  #      runtime divergence that needs a dedicated debug pass — likely
  #      Stryker's file-copy normalization of test files, or the runner's
  #      walkTestFiles picking up sandbox-internal duplicates.
  # Sprint 2.41 (TODO) will: reproduce locally with
  # `npx stryker run --incremental` on a stryker.conf.json with a single
  # fixture, dump the sandbox tree to compare against the working copy,
  # decide whether to exclude the eval-senior-tester test from Stryker
  # (testRunner config) or to fix the fixtureSha to be sandbox-stable.
  # Until then: manual-dispatch only for debugging.
  workflow_dispatch:
    inputs:
      mode:
        description: 'incremental | full'
        required: false
        default: 'incremental'
        type: choice
        options:
          - incremental
          - full

permissions:
  contents: read

jobs:
  mutation:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # R2 HIGH-2: lock job permissions tighter than workflow default.
    # Cache writes use actions:write derived from GITHUB_TOKEN — restrict
    # so only main can write to the shared cache scope.
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Stryker --since=HEAD~1 needs prior commit

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 'Verify package-lock.json is present (R2 HIGH-3)'
        run: |
          if [ ! -f package-lock.json ]; then
            echo "::error::package-lock.json missing; refusing to npm ci without integrity manifest"
            exit 1
          fi

      - name: 'Install deps (R2 HIGH-1 — ignore install scripts)'
        run: npm ci --ignore-scripts

      - name: Restore Stryker incremental cache (main-only key, no cross-branch fallback)
        id: cache-stryker
        # R2 HIGH-2: cache scope locked to main. Non-main pushes get a fresh
        # incremental cache; cannot poison main's state.
        uses: actions/cache@v4
        with:
          path: reports/stryker-incremental.json
          key: stryker-incremental-main-${{ hashFiles('stryker.conf.json') }}-${{ github.ref == 'refs/heads/main' && github.sha || 'feature' }}
          # Restore-keys scoped to main-prefixed entries only. A feature/* push
          # gets restore from the latest main baseline but cannot WRITE back
          # (cache write happens only when the run completes; non-main runs
          # produce keys that main never reads).
          restore-keys: |
            stryker-incremental-main-${{ hashFiles('stryker.conf.json') }}-
            stryker-incremental-main-

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          else
            echo "mode=incremental" >> "$GITHUB_OUTPUT"
          fi

      - name: 'Run Stryker incremental (R2 HIGH-3 — no-install)'
        if: steps.mode.outputs.mode == 'incremental'
        # Stryker 9.x uses `--incremental` boolean + the incremental.json cache
        # to detect changes. `--since=<rev>` was never a real CLI flag — it
        # was an unverified assumption in the original Sprint 2.3 wiring and
        # only surfaced on 2026-06-01 when the lockfile fix let the run get
        # past the npm-ci gate for the first time.
        run: npx --no-install stryker run --incremental
        env:
          CORTEX_BUDGET_DISABLED: '1'

      - name: 'Run Stryker full (R2 HIGH-3 — no-install)'
        if: steps.mode.outputs.mode == 'full'
        run: npx --no-install stryker run
        env:
          CORTEX_BUDGET_DISABLED: '1'

      - name: Upload Stryker HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-report-${{ github.run_id }}
          path: |
            reports/mutation/
            reports/stryker-incremental.json
          if-no-files-found: warn
          retention-days: 14

      - name: 'Summarize mutation score (R2 HIGH-4 — extracted from inline node -e)'
        if: always()
        run: node tools/summarize-mutation.cjs
