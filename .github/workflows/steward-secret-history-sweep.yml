# steward-secret-history-sweep.yml — Sprint 2.6b weekly cron.
#
# Wraps TruffleHog full-history scan with --only-verified. On verified
# hit: opens ONE gh issue per cron run with severity:high label. NO auto-PR
# (rotation + history rewrite are destructive + human-only).
#
# Fail-open: if trufflehog binary missing → workflow exits clean with one
# warning line. We deliberately install trufflehog at runtime so the cron
# is self-bootstrapping; if install fails, fail-open kicks in.

name: steward secret-history-sweep

# Permissions: workflow_hardener Sprint 2.5b — least-privilege baseline + per-job elevation.
permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'   # Sunday 02:00 UTC, before workflow-hardener 03:00

concurrency:
  group: steward-secret-sweep-${{ github.event.repository.name }}
  cancel-in-progress: false

jobs:
  steward-secret-sweep:
    name: steward secret-history-sweep
    runs-on: ubuntu-latest
    timeout-minutes: 30   # full history can be slow

    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0    # FULL history is the point

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'

      - name: Install TruffleHog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin || echo "install failed; fail-open"
          which trufflehog || echo "trufflehog not on PATH — kind will fail-open"
          trufflehog --version || true

      - name: Install Steward deps
        run: npm ci || npm install

      - name: Configure git identity
        run: |
          git config user.name  "Steward (cortex-x)"
          git config user.email "steward@cortex-x.local"

      - name: Steward secret-history-sweep dry-run
        id: plan
        run: |
          mkdir -p $GITHUB_WORKSPACE/.cortex-data
          node bin/cortex-steward.cjs dry-run \
            --slug=${{ github.event.repository.name }} \
            --trigger=cron \
            --kind=secret_history_sweep \
            --json > /tmp/steward-ss-plan.json || true
          cat /tmp/steward-ss-plan.json
          if ! jq -e . /tmp/steward-ss-plan.json > /dev/null 2>&1; then
            echo "Steward dry-run did not produce valid JSON — failing loudly"
            exit 1
          fi
          if jq -e '.mode == "dry-run"' /tmp/steward-ss-plan.json > /dev/null; then
            echo "has_action=true"  >> $GITHUB_OUTPUT
          else
            echo "has_action=false" >> $GITHUB_OUTPUT
          fi
        env:
          CORTEX_DATA_HOME: ${{ github.workspace }}/.cortex-data
          GH_TOKEN:         ${{ github.token }}

      - name: Steward secret-history-sweep execute
        if: steps.plan.outputs.has_action == 'true'
        run: |
          node bin/cortex-steward.cjs execute \
            --plan-file=/tmp/steward-ss-plan.json
        env:
          CORTEX_DATA_HOME: ${{ github.workspace }}/.cortex-data
          GH_TOKEN:         ${{ github.token }}

      - name: Upload journal artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: steward-secret-sweep-journal-${{ github.run_id }}
          path: .cortex-data/journal/
          retention-days: 30
