name: test

# Fast lane — Linux only, runs the full test suite on every PR + push.
# install-smoke.yml runs the cross-OS matrix on the same triggers.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'

      - name: Install dev dependencies
        # cortex-x does not commit a lockfile (private framework dist, not
        # an npm package). `npm install` resolves devDeps from package.json.
        run: npm install --no-fund --no-audit --no-progress

      - name: npm audit (devDeps only — high+critical gate)
        # Sprint 2.3a foundation: surface high/critical CVEs in the dev
        # dependency tree on every PR. cortex-x has no runtime deps; this is
        # a foundation step ahead of Sprint 2.3b mutation-testing tooling
        # (Stryker + fast-check) being added. Fails the lane on high or
        # critical findings; moderate/low are informational only.
        #
        # Trade-off note (Sprint 2.3a hardening D):
        # cortex-x intentionally does NOT commit a lockfile, so npm install
        # picks the latest matching semver-minor each run. fast-check@^4 + c8
        # transitive trees together resolve to ~87 packages — any high/
        # critical CVE in any of them blocks all PRs until upstream patches.
        # If this becomes noisy, the relief paths are (in order):
        #   1) Pin the offending dep to an exact patch version that lacks the
        #      CVE (preferred — narrowest fix).
        #   2) Bump `--audit-level=critical` temporarily (loses high-severity
        #      coverage; only acceptable for short windows with a tracking
        #      issue + rollback date).
        #   3) Skip the gate via `continue-on-error: true` for ONE PR while
        #      operator triages (last resort; never on main).
        # Re-tighten by reverting to `high` once upstream cleanup completes.
        run: npm audit --audit-level=high --omit=optional

      - name: Show test inventory
        run: |
          echo "::group::Test files"
          find tests -name '*.test.cjs' -type f | sort
          echo "::endgroup::"
          echo "::group::Fixtures"
          find tests/fixtures -maxdepth 2 -name 'package.json' -type f | sort
          echo "::endgroup::"

      - name: Unit + contract suites
        run: npm run test:fast

      - name: Detector tests (with fixture rebuild)
        run: npm run test:detectors

      - name: Audit validator tests
        run: npm run test:audit

      - name: Integration tests (install roundtrip)
        # roundtrip needs a clean isolated $HOME — runs `bash install.sh` into
        # a tmpdir. Linux runners always have bash.
        run: npm run test:integration

      - name: Coverage report (informational, not gated)
        # Coverage is informational right now — we ratchet thresholds upward
        # over 2-3 sprints once we have a baseline (per cortex-x's "measure
        # first, ratchet later" pattern in standards/testing.md).
        run: npm run test:coverage || true
        continue-on-error: true

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-html
          path: coverage/
          if-no-files-found: ignore
          retention-days: 14
