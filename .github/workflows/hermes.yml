# hermes.yml — autonomous Hermes runtime workflow.
#
# Sprint 1.6.13–1.6.19 shipped v0.5b OpenRouter engine + push + draft PR
# pipeline + budget cap + circuit breaker. This workflow runs the full
# autonomous loop: dry-run → execute (real LLM via OpenRouter) → file edits
# → npm test gate → atomic commit → git push → gh pr create --draft.
#
# Required repo secret: OPENROUTER_API_KEY (inference key, not provisioning).
# Optional env knobs: HERMES_MODEL (default deepseek/deepseek-v4-flash),
# HERMES_MAX_TOKENS (default 4096, recommend 16384), HERMES_DAILY_USD_CAP
# (default $5), HERMES_FAILURE_BREAKER (default 3).
#
# See docs/hermes-runtime.md § 1.2 "Trigger model" for design rationale.
# See docs/hermes-usage.md § Model selection for HERMES_MODEL recommendations.

name: hermes weekly

on:
  workflow_dispatch:        # manual run via GH UI / `gh workflow run hermes.yml`
  schedule:
    - cron: '0 4 * * 0'     # Sunday 04:00 UTC — matches config/evolve.yaml cadence.weekly.cron

# Mutex-by-repo per MUST-H2: at most one running Hermes per repo at a time.
# `cancel-in-progress: false` because Hermes actions are stateful (mid-action
# cancellation could leave a partial commit on hermes/<branch>); we'd rather
# queue.
concurrency:
  group: hermes-${{ github.event.repository.name }}
  cancel-in-progress: false

jobs:
  hermes-run:
    name: hermes weekly
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write           # commit on hermes/<date>-<slug>-<id> branch + push
      pull-requests: write      # gh pr create --draft

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0        # Hermes journal lookup needs full git history

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install deps
        run: npm ci || npm install

      - name: Verify pre-Hermes gates
        run: |
          npm test
          # Pre-flight: if the project's own test suite is red, do NOT run Hermes —
          # Hermes verifies via npm test, so a red baseline = false positives.

      - name: Configure git identity (Hermes commits)
        run: |
          git config user.name  "Hermes (cortex-x)"
          git config user.email "hermes@cortex-x.local"

      - name: Hermes dry-run (plan only)
        id: plan
        run: |
          mkdir -p $GITHUB_WORKSPACE/.cortex-data
          node bin/cortex-hermes.cjs dry-run \
            --slug=${{ github.event.repository.name }} \
            --trigger=cron \
            --json > /tmp/hermes-plan.json
          cat /tmp/hermes-plan.json
          # Set step output: has_action=true iff dry-run produced an actionable plan
          if jq -e '.mode == "dry-run"' /tmp/hermes-plan.json > /dev/null; then
            echo "has_action=true"  >> $GITHUB_OUTPUT
          else
            echo "has_action=false" >> $GITHUB_OUTPUT
            echo "Dry-run returned no actionable step — exiting clean."
          fi
        env:
          CORTEX_DATA_HOME: ${{ github.workspace }}/.cortex-data

      - name: Hermes execute (real LLM via OpenRouter, atomic commit, push, draft PR)
        if: steps.plan.outputs.has_action == 'true'
        run: |
          node bin/cortex-hermes.cjs execute \
            --plan-file=/tmp/hermes-plan.json
        env:
          OPENROUTER_API_KEY:      ${{ secrets.OPENROUTER_API_KEY }}
          HERMES_MODEL:            deepseek/deepseek-v4-flash
          HERMES_MAX_TOKENS:       '16384'
          HERMES_DAILY_USD_CAP:    '5'
          HERMES_FAILURE_BREAKER:  '3'
          CORTEX_DATA_HOME:        ${{ github.workspace }}/.cortex-data
          GH_TOKEN:                ${{ github.token }}   # for `gh pr create --draft` inside execute

      - name: Upload journal artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hermes-journal-${{ github.run_id }}
          path: .cortex-data/journal/
          retention-days: 30
